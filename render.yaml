services:
  - type: web
    name: ai-stock-research
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        fromDatabase:
          name: ai-stock-research-db
          property: connectionString

databases:
  - name: ai-stock-research-db
    plan: free